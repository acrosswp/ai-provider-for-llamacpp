<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bgGradient)"/>

  <!-- Neural Pathways (background circuit lines) -->
  <g stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 50 80 Q 100 100, 140 60" />
    <path d="M 140 60 L 180 40" />
    <path d="M 180 40 Q 200 60, 190 100" />
    <path d="M 50 150 L 100 130 L 140 160" />
    <path d="M 140 160 Q 160 180, 180 160" />
  </g>

  <!-- Center Brain/Circuit Core -->
  <!-- Outer hexagon framework (terminal aesthetic) -->
  <g stroke="url(#primaryGlow)" stroke-width="2.5" fill="none" filter="url(#glow)">
    <circle cx="128" cy="128" r="70"/>
    <circle cx="128" cy="128" r="55"/>
  </g>

  <!-- Brain-inspired neural nodes connected by lines -->
  <g stroke="url(#primaryGlow)" stroke-width="2" fill="none" opacity="0.8">
    <!-- Top neural connections -->
    <line x1="128" y1="60" x2="95" y2="85" />
    <line x1="128" y1="60" x2="161" y2="85" />
    <!-- Side connections -->
    <line x1="70" y1="128" x2="95" y2="128" />
    <line x1="186" y1="128" x2="161" y2="128" />
    <!-- Bottom connections -->
    <line x1="128" y1="196" x2="95" y2="171" />
    <line x1="128" y1="196" x2="161" y2="171" />
  </g>

  <!-- Neural node points -->
  <g fill="url(#primaryGlow)" filter="url(#softGlow)">
    <!-- Center core (bright) -->
    <circle cx="128" cy="128" r="6"/>
    <!-- Top node -->
    <circle cx="128" cy="60" r="5"/>
    <!-- Side nodes -->
    <circle cx="70" cy="128" r="4"/>
    <circle cx="186" cy="128" r="4"/>
    <!-- Bottom nodes -->
    <circle cx="128" cy="196" r="5"/>
    <!-- Diagonal connectors -->
    <circle cx="95" cy="85" r="3.5"/>
    <circle cx="161" cy="85" r="3.5"/>
    <circle cx="95" cy="171" r="3.5"/>
    <circle cx="161" cy="171" r="3.5"/>
  </g>

  <!-- Inner detail: Terminal cursor/bracket accent -->
  <g stroke="#7c3aed" stroke-width="2.5" fill="none" opacity="0.9" stroke-linecap="round">
    <!-- Left bracket -->
    <path d="M 100 110 L 88 110 L 88 146 L 100 146"/>
    <!-- Right bracket (echo of terminal aesthetic) -->
    <path d="M 156 110 L 168 110 L 168 146 L 156 146"/>
  </g>

  <!-- Accent glow circles (server/processor idea) -->
  <circle cx="128" cy="60" r="8" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.4"/>
  <circle cx="70" cy="128" r="8" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.4"/>
  <circle cx="186" cy="128" r="8" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <circle cx="128" cy="196" r="8" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.4"/>

  <!-- Subtle grid overlay (local processing) -->
  <g stroke="#3b82f6" stroke-width="0.8" opacity="0.08">
    <line x1="40" y1="40" x2="216" y2="40" />
    <line x1="40" y1="80" x2="216" y2="80" />
    <line x1="40" y1="120" x2="216" y2="120" />
    <line x1="40" y1="160" x2="216" y2="160" />
    <line x1="40" y1="200" x2="216" y2="200" />
    <line x1="40" y1="240" x2="216" y2="240" />
  </g>
</svg>
