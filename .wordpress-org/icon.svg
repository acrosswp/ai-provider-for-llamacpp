<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#iconGrad256)"/>
  
  <!-- Llama head centered -->
  <g transform="translate(128, 80)">
    <!-- Head body -->
    <ellipse cx="0" cy="0" rx="45" ry="55" fill="white"/>
    <!-- Ears -->
    <ellipse cx="-30" cy="-40" rx="13" ry="30" fill="white" transform="rotate(-25 -30 -40)"/>
    <ellipse cx="30" cy="-40" rx="13" ry="30" fill="white" transform="rotate(25 30 -40)"/>
    <!-- Snout -->
    <ellipse cx="0" cy="32" rx="22" ry="18" fill="#e8d5c4"/>
    <!-- Eyes -->
    <circle cx="-16" cy="-10" r="6" fill="#333"/>
    <circle cx="16" cy="-10" r="6" fill="#333"/>
    <!-- Pupils with shine -->
    <circle cx="-15" cy="-9" r="3" fill="#fff"/>
    <circle cx="17" cy="-9" r="3" fill="#fff"/>
    <!-- Nostril accents -->
    <circle cx="-8" cy="42" r="3" fill="#333"/>
    <circle cx="8" cy="42" r="3" fill="#333"/>
  </g>
  
  <!-- Code/tech symbol (brackets) -->
  <g transform="translate(128, 155)">
    <!-- Left bracket -->
    <path d="M -35 -25 L -25 -25 L -25 25 L -35 25" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right bracket -->
    <path d="M 35 -25 L 25 -25 L 25 25 L 35 25" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="white"/>
  </g>
</svg>